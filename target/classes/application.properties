# ============================================================
#  Sistema de Turnos - Configuración de la aplicación
# ============================================================

# Nombre de la aplicación
spring.application.name=sistema-turnos

# Puerto del servidor
server.port=8080

# ============================================================
#  Conexión MongoDB
# ============================================================
spring.data.mongodb.uri=mongodb://localhost:27017/turnos_db

# ============================================================
#  Logs (opcional - útil durante desarrollo)
# ============================================================
logging.level.org.springframework.data.mongodb=DEBUG
